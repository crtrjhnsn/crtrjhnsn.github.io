<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Palette Mixer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f8fafc;
      color: #1e293b;
      min-height: 100vh;
      padding: 32px 24px;
    }
    h1 { font-size: 1.375rem; font-weight: 700; margin-bottom: 6px; text-align: center; }
    .subtitle { text-align: center; color: #64748b; font-size: 0.875rem; margin-bottom: 28px; }
    .picker-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 32px;
    }
    label { font-size: 0.875rem; font-weight: 600; color: #475569; }
    input[type="color"] {
      width: 56px; height: 56px;
      border-radius: 50%;
      border: 3px solid #e2e8f0;
      padding: 2px;
      cursor: pointer;
      background: none;
      box-shadow: 0 2px 8px rgba(0,0,0,.12);
    }
    .palette {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 12px;
    }
    .swatch {
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
    }
    .swatch:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,.15); }
    .swatch-color { height: 80px; }
    .swatch-info {
      background: #fff;
      padding: 10px 12px;
    }
    .swatch-name  { font-size: 0.75rem; font-weight: 600; color: #475569; margin-bottom: 2px; }
    .swatch-hex   { font-family: monospace; font-size: 0.8125rem; color: #1e293b; }
    .swatch-aa    { font-size: 0.6875rem; margin-top: 4px; }
    .pass { color: #059669; } .fail { color: #dc2626; }
    .toast {
      position: fixed;
      bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: #1e293b;
      color: #fff;
      padding: 10px 20px;
      border-radius: 99px;
      font-size: 0.875rem;
      transition: transform .25s ease;
      pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
  <h1>Palette Mixer</h1>
  <p class="subtitle">Pick a base color to generate a full 9-shade palette with contrast ratings.</p>
  <div class="picker-row">
    <label for="base-color">Base color</label>
    <input type="color" id="base-color" value="#7c3aed" />
  </div>
  <div class="palette" id="palette"></div>
  <div class="toast" id="toast">Copied to clipboard!</div>

  <script>
    const input   = document.getElementById('base-color');
    const palette = document.getElementById('palette');
    const toast   = document.getElementById('toast');

    function hexToHsl(hex) {
      let r = parseInt(hex.slice(1,3),16)/255;
      let g = parseInt(hex.slice(3,5),16)/255;
      let b = parseInt(hex.slice(5,7),16)/255;
      const max=Math.max(r,g,b), min=Math.min(r,g,b);
      let h,s,l=(max+min)/2;
      if(max===min){h=s=0;}else{
        const d=max-min; s=l>.5?d/(2-max-min):d/(max+min);
        switch(max){case r:h=(g-b)/d+(g<b?6:0);break;case g:h=(b-r)/d+2;break;case b:h=(r-g)/d+4;break;}
        h/=6;
      }
      return [Math.round(h*360), Math.round(s*100), Math.round(l*100)];
    }

    function hslToHex(h,s,l) {
      s/=100; l/=100;
      const a=s*Math.min(l,1-l);
      const f=n=>{const k=(n+h/30)%12;const c=l-a*Math.max(Math.min(k-3,9-k,1),-1);return Math.round(255*c).toString(16).padStart(2,'0');};
      return `#${f(0)}${f(8)}${f(4)}`;
    }

    function luminance(hex) {
      const [r,g,b] = [hex.slice(1,3),hex.slice(3,5),hex.slice(5,7)].map(c => {
        const v=parseInt(c,16)/255; return v<=.03928?v/12.92:Math.pow((v+.055)/1.055,2.4);
      });
      return .2126*r+.7152*g+.0722*b;
    }

    function contrast(hex1, hex2) {
      const l1=luminance(hex1), l2=luminance(hex2);
      return (Math.max(l1,l2)+.05)/(Math.min(l1,l2)+.05);
    }

    function generate(baseHex) {
      const [h,s] = hexToHsl(baseHex);
      const lightnesses = [97,93,85,74,62,50,38,26,16];
      const names = ['50','100','200','300','400','500','600','700','800'];
      return lightnesses.map((l,i) => {
        const hex = hslToHex(h, Math.min(s, 90), l);
        const onWhite = contrast(hex, '#ffffff');
        const onBlack = contrast(hex, '#000000');
        return { name: names[i], hex, onWhite, onBlack };
      });
    }

    function render() {
      const swatches = generate(input.value);
      palette.innerHTML = swatches.map(s => {
        const aaW = s.onWhite >= 4.5 ? '<span class="pass">AA on white</span>' : '<span class="fail">Fails on white</span>';
        const aaB = s.onBlack >= 4.5 ? '<span class="pass">AA on black</span>' : '<span class="fail">Fails on black</span>';
        return `
          <div class="swatch" data-hex="${s.hex}" title="Click to copy ${s.hex}">
            <div class="swatch-color" style="background:${s.hex}"></div>
            <div class="swatch-info">
              <div class="swatch-name">${s.name}</div>
              <div class="swatch-hex">${s.hex}</div>
              <div class="swatch-aa">${aaW} · ${aaB}</div>
            </div>
          </div>`;
      }).join('');
    }

    palette.addEventListener('click', async e => {
      const sw = e.target.closest('.swatch');
      if (!sw) return;
      await navigator.clipboard.writeText(sw.dataset.hex).catch(()=>{});
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    });

    input.addEventListener('input', render);
    render();
  </script>
</body>
</html>
